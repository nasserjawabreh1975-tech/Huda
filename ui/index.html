<!DOCTYPE html>
<html>

<head>

<title>HUDA PLATFORM</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

.ok{
color:#22c55e;
font-weight:bold;
}

button{
padding:12px;
background:#38bdf8;
border:none;
border-radius:10px;
cursor:pointer;
}

textarea{
width:100%;
height:120px;
background:#0f172a;
color:white;
padding:10px;
}

input{
width:100%;
padding:10px;
background:#0f172a;
color:white;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>HUDA SOVEREIGN PLATFORM</h1>

<div class="card">
<h2>Runtime Status</h2>
<p class="ok">ONLINE</p>
</div>

<div class="card">

<h2>Execution Console</h2>

<input id="cmd" placeholder="command">

<button onclick="run()">EXECUTE</button>

<br><br>

<textarea id="out"></textarea>

</div>

<script>

async function run(){

let cmd=document.getElementById("cmd").value

let r=await fetch(
"http://localhost:8000/execute?cmd="+encodeURIComponent(cmd),
{
method:"POST"
})

let d=await r.json()

document.getElementById("out").value=d.output

}

</script>

</body>
</html>
